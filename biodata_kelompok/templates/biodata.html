<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biodata Kelompok</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.1/css/fontawesome.min.css"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for biodata in biodata_list %}
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">{{ biodata.user.username }}</h5>
            <p class="card-text">
              {% for socialaccount in biodata.user.socialaccount_set.all %}
                {% if socialaccount.provider == 'google' %}
                    <p>email: {{ socialaccount.extra_data.email }}</p>
                {% endif %}
              {% endfor %}
              {{ biodata.bio }}
            </p>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
