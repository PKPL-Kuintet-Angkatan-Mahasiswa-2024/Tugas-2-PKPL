{% extends "base.html" %} {% block title %}Edit Biodata &mdash; {{
request.user.username }} {% endblock %} {% block content %}
<section class="hero">
  <h1 class="hero-title">Edit Biodata</h1>
  <p class="hero-subtitle">Perubahan akan ditampil pada halaman utama</p>
</section>

<div class="form-card">
  <form method="post" action="{% url 'biodata:edit_biodata' %}">
    {% csrf_token %}

    <div class="form-group">
      <label class="form-label" for="nama">Nama Lengkap</label>
      <input
        type="text"
        name="nama"
        id="nama"
        class="form-input"
        maxlength="100"
        value="{{ biodata.nama|default_if_none:'' }}"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="npm">NPM</label>
      <input
        type="text"
        name="npm"
        id="npm"
        class="form-input"
        maxlength="16"
        value="{{ biodata.npm|default_if_none:'' }}"
        required
      />
    </div>

    <button type="submit" class="btn btn-accent">Simpan Perubahan</button>
    <a href="{% url 'biodata:homepage' %}" class="btn btn-outline">Batal</a>
  </form>
</div>
{% endblock %}
